<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Stylish Website</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Internal CSS -->
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            scroll-behavior: smooth;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        .about {
            padding: 80px 0;
        }

        h1, h2 {
            font-weight: bold;
        }

        .btn-primary {
            background-color: #ff7a18;
            border: none;
        }

        .btn-primary:hover {
            background-color: #ff5200;
        }

        footer {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">MySite</a>
    <div>
      <a href="#home" class="btn btn-outline-light me-2">Home</a>
      <a href="#about" class="btn btn-outline-light">About</a>
    </div>
  </div>
</nav>

<!-- Hero Section -->
<section id="home" class="hero d-flex align-items-center text-center text-white">
    <div class="container">
        <h1>Welcome to My Website!!!</h1>
        <p class="lead">Let's explore new things with us...</p>
        <button class="btn btn-primary btn-lg mt-3" onclick="showMessage()">Explore</button>
    </div>
</section>

<!-- About Section -->
<section id="about" class="about text-center">
    <div class="container">
        <h2>About This Website</h2>
        <p class="mt-3">
            This is a static website built using only HTML, CSS, and JavaScript.
        </p>
        <button class="btn btn-dark mt-3" onclick="showAbout()">Learn More</button>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 My Stylish Website</p>
</footer>

<!-- JavaScript -->
<script>
    function showMessage() {
        alert("Welcome! You clicked Explore...");
    }

    function showAbout() {
        alert("This is a static website with attractive UI!");
    }
</script>

</body>
</html>
